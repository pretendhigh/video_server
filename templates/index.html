<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Server</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Video Server</h1>
        <div class="header-actions">
            <span id="video-count">Loading...</span>
            <button id="logs-btn" class="btn-secondary">Logs</button>
            <button id="refresh-btn" class="btn-secondary">Refresh</button>
        </div>
    </header>

    <!-- Search Bar -->
    <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search videos..." autocomplete="off">
        <button id="search-btn" class="btn-primary">Search</button>
        <button id="clear-search" class="btn-secondary hidden">Clear</button>
    </div>

    <!-- Category Tabs -->
    <div class="category-tabs" id="category-tabs">
        <button class="tab-btn active" data-category="all">All</button>
    </div>

    <main>
        <div id="loading" class="loading">Scanning videos...</div>
        <div id="video-grid" class="video-grid"></div>
        <div id="empty-state" class="empty-state hidden">
            <p>No videos found in this directory.</p>
            <p>Supported formats: MP4, WebM, MKV, AVI, MOV, FLV, WMV, M4V</p>
        </div>
        <div id="no-search-results" class="empty-state hidden">
            <p>No videos match your search.</p>
            <p>Try different keywords or browse by category.</p>
        </div>
    </main>

    <!-- Video Player Modal -->
    <div id="player-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content player-modal-content">
            <!-- Header -->
            <div class="player-header">
                <h3 id="player-title">Video Title</h3>
                <button id="close-player" class="btn-close">&times;</button>
            </div>

            <!-- Video Area (fullscreen container) -->
            <div class="player-video-area" id="player-video-area">
                <div class="custom-video-player" id="custom-video-player">
                    <video id="video-player">
                        <source src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>

                    <!-- Center Play Button (shows when paused) -->
                    <div class="center-play-overlay hidden" id="center-play-overlay">
                        <button class="big-play-btn" id="big-play-btn">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Controls Bar (at the bottom, inside fullscreen container) -->
                <div class="player-controls-bar" id="player-controls-bar">
                    <!-- Progress Bar -->
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                        <div class="progress-handle" id="progress-handle"></div>
                    </div>

                    <!-- Control Buttons -->
                    <div class="controls-row">
                        <!-- Left: Rewind + Play/Pause + Forward + Time -->
                        <div class="controls-left">
                            <button class="ctrl-icon-btn" id="ctrl-rewind" title="快退 (Left Arrow)">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                            </button>
                            <button class="ctrl-icon-btn" id="ctrl-play-pause" title="播放/暂停 (Space)">
                                <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                                <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </button>
                            <button class="ctrl-icon-btn" id="ctrl-forward" title="快进 (Right Arrow)">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                            </button>
                            <span class="time-display" id="time-display">0:00 / 0:00</span>
                        </div>

                        <!-- Right: Speed + PIP + Download + Fullscreen -->
                        <div class="controls-right">
                            <!-- Speed Selector -->
                            <div class="speed-selector">
                                <button class="speed-menu-btn" id="speed-menu-btn">倍速</button>
                                <div class="speed-popup hidden" id="speed-popup">
                                    <div class="speed-popup-header">播放速度</div>
                                    <div class="speed-options" id="speed-options"></div>
                                </div>
                            </div>

                            <!-- PIP Button -->
                            <button class="ctrl-icon-btn" id="ctrl-pip" title="画中画">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                            </button>

                            <!-- Download Button -->
                            <button class="ctrl-icon-btn" id="ctrl-download" title="下载">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                            </button>

                            <!-- Fullscreen Button -->
                            <button class="ctrl-icon-btn" id="ctrl-fullscreen" title="全屏 (F)">
                                <svg class="icon-fullscreen" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                                <svg class="icon-exit-fullscreen hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logs-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content logs-modal-content">
            <div class="player-header">
                <h3>Server Logs</h3>
                <button id="close-logs" class="btn-close">&times;</button>
            </div>
            <div class="logs-container">
                <pre id="logs-content">Loading logs...</pre>
            </div>
            <div class="logs-actions">
                <button id="refresh-logs" class="btn-secondary">Refresh Logs</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
